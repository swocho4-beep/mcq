    // Variables
    let shuffledQuestions = [];
    let currentQuestionIndex = 0;
    let score = 0;
    const totalQuestionsToShow = 10; // Out of 15, we show 10 per session for randomness

    // DOM Elements
    const progressEl = document.getElementById("progress");
    const questionEl = document.getElementById("question");
    const optionsEl = document.getElementById("options");
    const feedbackEl = document.getElementById("feedback");
    const nextBtn = document.getElementById("next-btn");
    const quizEl = document.getElementById("quiz");
    const scoreBoardEl = document.getElementById("score-board");

    // Initialize Quiz
    function startQuiz() {
        // Shuffle the full pool of 15 questions and pick 10
        shuffledQuestions = [...rawQuestions].sort(() => Math.random() - 0.5).slice(0, totalQuestionsToShow);
        currentQuestionIndex = 0;
        score = 0;
        loadQuestion();
    }

    function loadQuestion() {
        nextBtn.style.display = "none";
        feedbackEl.style.display = "none";
        optionsEl.innerHTML = "";
        
        const currentData = shuffledQuestions[currentQuestionIndex];
        
        progressEl.innerText = `প্রশ্ন ${currentQuestionIndex + 1} / ${totalQuestionsToShow}`;
        questionEl.innerText = currentData.question;

        // Shuffle options
        let shuffledOptions = [...currentData.options].sort(() => Math.random() - 0.5);

        shuffledOptions.forEach(option => {
            const button = document.createElement("button");
            button.classList.add("option-btn");
            button.innerText = option;
            button.onclick = () => selectAnswer(button, currentData);
            optionsEl.appendChild(button);
        });
    }

    function selectAnswer(selectedButton, currentData) {
        const allButtons = optionsEl.querySelectorAll("button");
        allButtons.forEach(btn => btn.disabled = true); // Disable all buttons

        const isCorrect = selectedButton.innerText === currentData.answer;

        if (isCorrect) {
            selectedButton.classList.add("correct");
            score++;
        } else {
            selectedButton.classList.add("wrong");
            // Highlight the correct one automatically
            allButtons.forEach(btn => {
                if (btn.innerText === currentData.answer) {
                    btn.classList.add("correct");
                }
            });
        }

        // Show rationale/feedback
        feedbackEl.innerHTML = `<strong>ব্যাখ্যা:</strong> ${currentData.rationale}`;
        feedbackEl.style.display = "block";
        nextBtn.style.display = "block";
    }

    function nextQuestion() {
        currentQuestionIndex++;
        if (currentQuestionIndex < shuffledQuestions.length) {
            loadQuestion();
        } else {
            showScore();
        }
    }

    function showScore() {
        quizEl.style.display = "none";
        scoreBoardEl.style.display = "block";
        document.getElementById("score").innerText = score;
        document.getElementById("total").innerText = totalQuestionsToShow;
    }

    // Run on load
    startQuiz();
</script>
